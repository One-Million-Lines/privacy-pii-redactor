name: Publish Python package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Test and build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package and release tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine pytest ruff
          python -m pip install -e .

      - name: Run linting
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as file:
              data = tomllib.load(file)

          print(data["project"]["version"])
          PY
          )

          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "Package version: ${PACKAGE_VERSION}"
          echo "Tag version: ${TAG_VERSION}"

          if [ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Tag and pyproject.toml versions do not match."
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Validate package
        run: python -m twine check --strict dist/*

      - name: Store package distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish package to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/privacy-pii-redactor

    permissions:
      id-token: write

    steps:
      - name: Download package distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1